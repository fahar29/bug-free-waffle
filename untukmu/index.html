<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Autoplay GitHub</title>
    <style>
        /* Gaya tampilan sederhana */
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .play-btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #24292e; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Selamat Datang di Web Saya</h2>
    
    <!-- Tombol untuk memicu audio (Karena kebijakan browser) -->
    <button class="play-btn" onclick="mulaiAudio()">Klik untuk Masuk & Putar Musik</button>

    <!-- Tag Audio -->
    <audio id="myAudio" loop>
        <!-- Pastikan nama file MP3 sesuai dengan yang ada di repo GitHub Anda -->
        <source src="musik.mp3.mp3" type="audio/mpeg">
        Browser Anda tidak mendukung elemen audio.
    </audio>

    <script>
        function mulaiAudio() {
            var audio = document.getElementById("myAudio");
            
            // Memutar audio
            audio.play().then(() => {
                console.log("Audio berhasil diputar!");
                // Opsional: Sembunyikan tombol setelah diklik
                document.querySelector('.play-btn').style.display = 'none';
            }).catch(error => {
                console.log("Pemutaran gagal: " + error);
            });
        }
    </script>

</body>
</html>
